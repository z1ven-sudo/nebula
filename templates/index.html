<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Social | Premium Experience</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 
         * =========================================
         * CSS VARIABLES & THEME (Glassmorphism)
         * =========================================
         */
        
         :root {
            --primary-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --accent-color: #0095f6;
            --bg-color: #000000;
            --surface-color: #121212;
            --surface-glass: rgba(18, 18, 18, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-secondary: #a8a8a8;
            --danger: #ff4949;
            --success: #00c853;
            --nav-height: 60px;
            --sidebar-width: 245px;
            --feed-max-width: 630px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --radius-round: 50%;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        [data-theme="light"] {
            --bg-color: #fafafa;
            --surface-color: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.85);
            --border-color: #dbdbdb;
            --text-main: #262626;
            --text-secondary: #8e8e8e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: transparent;
        }
        
         ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        /* Utility */
        
        .hidden {
            display: none !important;
        }
        
        .flex {
            display: flex;
        }
        
        .flex-col {
            flex-direction: column;
        }
        
        .items-center {
            align-items: center;
        }
        
        .justify-center {
            justify-content: center;
        }
        
        .justify-between {
            justify-content: space-between;
        }
        
        .gap-2 {
            gap: 0.5rem;
        }
        
        .gap-4 {
            gap: 1rem;
        }
        
        .w-full {
            width: 100%;
        }
        
        .btn {
            cursor: pointer;
            border: none;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 16px;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        
        .btn-primary:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--accent-color);
        }
        
        .btn-icon {
            background: transparent;
            color: var(--text-main);
            font-size: 1.5rem;
        }
        /* 
         * =========================================
         * AUTH SCREENS
         * =========================================
         */
        
        #auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-box {
            width: 350px;
            padding: 40px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        
        .auth-input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-main);
        }
        
        .auth-input:focus {
            border-color: var(--text-secondary);
        }
        /* 
         * =========================================
         * MAIN LAYOUT
         * =========================================
         */
        
        #app-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr 300px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }
        /* Sidebar (Desktop) */
        
        aside.sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 24px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            transition: var(--transition);
            margin-bottom: 4px;
            cursor: pointer;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }
        
        .nav-link i {
            font-size: 1.4rem;
            width: 24px;
            text-align: center;
        }
        /* Main Feed */
        
        main.feed-container {
            border-right: 1px solid var(--border-color);
            padding: 0;
            overflow-y: auto;
            height: 100vh;
            scroll-behavior: smooth;
        }
        /* Stories Rail */
        
        .stories-rail {
            padding: 16px 0;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            background: var(--surface-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 70px;
        }
        
        .story-ring {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            padding: 3px;
            background: var(--primary-gradient);
            margin-bottom: 4px;
            position: relative;
        }
        
        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--surface-color);
            object-fit: cover;
        }
        
        .story-name {
            font-size: 0.75rem;
            color: var(--text-main);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Feed Posts */
        
        .post-card {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 12px;
            background: var(--surface-color);
            position: relative;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
        }
        
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .post-image-container {
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            position: relative;
            user-select: none;
        }
        
        .post-image {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
            display: block;
        }
        /* Double Tap Heart Animation */
        
        .big-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 6rem;
            color: white;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .animate-heart {
            animation: heartPop 0.8s ease-in-out;
        }
        
        @keyframes heartPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            15% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            30% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 1;
            }
            45% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            80% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
        }
        
        .post-actions {
            padding: 12px 16px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
        }
        
        .action-left {
            display: flex;
            gap: 16px;
        }
        
        .like-btn.liked {
            color: var(--danger);
            animation: heartBounce 0.4s;
        }
        
        @keyframes heartBounce {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .post-content {
            padding: 0 16px;
        }
        
        .likes-count {
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .caption {
            margin-bottom: 6px;
        }
        
        .caption .username {
            font-weight: 600;
            margin-right: 6px;
            cursor: pointer;
        }
        
        .view-comments {
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 6px;
            display: block;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        /* Comments Section */
        
        .comments-list {
            padding: 0 16px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        
        .comment-item {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .comment-item strong {
            margin-right: 4px;
        }
        
        .add-comment {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .comment-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            resize: none;
            height: 20px;
            max-height: 80px;
        }
        
        .post-btn {
            color: var(--accent-color);
            font-weight: 600;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .post-btn.active {
            opacity: 1;
            pointer-events: all;
        }
        /* Right Panel */
        
        aside.right-panel {
            padding: 24px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        
        .user-profile-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .user-info-summary {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar-lg {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }
        
        .username-block div:first-child {
            font-weight: 600;
        }
        
        .username-block div:last-child {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .switch-btn {
            color: var(--accent-color);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .suggestions-header {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        
        .suggestion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .follow-btn {
            color: var(--accent-color);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        /* Mobile Bottom Nav */
        
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        /* Modals */
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        
        .create-post-modal {
            background: var(--surface-color);
            width: 90%;
            max-width: 500px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }
        
        .modal-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
        }
        
        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .upload-area {
            border: 2px dashed var(--border-color);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .upload-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            display: none;
        }
        /* STORY VIEWER (New Feature) */
        
        #story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        #story-viewer.open {
            opacity: 1;
            pointer-events: all;
        }
        
        .story-progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            width: 100%;
            position: absolute;
            top: 10px;
            left: 0;
            z-index: 10;
        }
        
        .story-progress-fill {
            height: 100%;
            background: white;
            width: 0%;
        }
        
        .story-nav {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 20;
            color: white;
        }
        
        .story-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }
        /* PROFILE PAGE STYLES */
        
        .profile-header {
            padding: 30px 20px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }
        
        .profile-stats {
            display: flex;
            gap: 40px;
            margin: 20px 0;
        }
        
        .stat-num {
            font-weight: 700;
            font-size: 1.2rem;
            display: block;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        
        .profile-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        /* SEARCH STYLES */
        
        .search-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: #262626;
            color: white;
            font-size: 1rem;
        }
        
        .search-results {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 20px;
        }
        /* Toast Notification */
        
        #toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .toast {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        /* Responsive */
        
        @media (max-width: 1000px) {
            #app-layout {
                grid-template-columns: 80px 1fr 0;
            }
            aside.sidebar {
                align-items: center;
            }
            .nav-link span {
                display: none;
            }
            .nav-link i {
                font-size: 1.6rem;
            }
            aside.right-panel {
                display: none;
            }
        }
        
        @media (max-width: 600px) {
            #app-layout {
                grid-template-columns: 1fr;
                display: block;
            }
            aside.sidebar {
                display: none;
            }
            .mobile-nav {
                display: flex;
            }
            main.feed-container {
                padding-bottom: 70px;
                border: none;
            }
            .stories-rail {
                background: var(--bg-color);
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- AUTH SCREEN -->
    <div id="auth-container">
        <div id="login-form" class="auth-box">
            <h1 class="logo-text">Nebula</h1>
            <form onsubmit="Auth.login(event)">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" class="auth-input" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Log In</button>
            </form>
            <div style="margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="#" onclick="UI.toggleAuth('register')" style="color: var(--accent-color)">Sign up</a>
            </div>
        </div>
        <div id="register-form" class="auth-box hidden">
            <h1 class="logo-text">Nebula</h1>
            <form onsubmit="Auth.register(event)">
                <div class="input-group"><label>Email</label><input type="email" id="reg-email" class="auth-input" placeholder="Email" required></div>
                <div class="input-group"><label>Full Name</label><input type="text" id="reg-name" class="auth-input" placeholder="Full Name" required></div>
                <div class="input-group"><label>Username</label><input type="text" id="reg-username" class="auth-input" placeholder="Username" required></div>
                <div class="input-group"><label>Password</label><input type="password" id="reg-password" class="auth-input" placeholder="Password" required></div>
                <button type="submit" class="btn btn-primary w-full">Sign Up</button>
            </form>
            <div style="margin-top: 20px; font-size: 0.9rem;">
                Have an account? <a href="#" onclick="UI.toggleAuth('login')" style="color: var(--accent-color)">Log in</a>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-layout" class="hidden">
        <aside class="sidebar">
            <h1 class="logo-text" style="font-size: 1.8rem; margin-bottom: 30px;">Nebula</h1>
            <nav>
                <a href="#" class="nav-link active" onclick="Router.navigate('home')"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="#" class="nav-link" onclick="Router.navigate('explore')"><i class="fas fa-search"></i> <span>Explore</span></a>
                <a href="#" class="nav-link" onclick="Router.navigate('reels')"><i class="fas fa-film"></i> <span>Reels</span></a>
                <a href="#" class="nav-link" onclick="Router.navigate('profile')"><i class="fas fa-user-circle"></i> <span>Profile</span></a>
            </nav>
            <div style="margin-top: auto;">
                <a href="#" class="nav-link" onclick="UI.toggleTheme()"><i class="fas fa-moon"></i> <span>Theme</span></a>
                <a href="#" class="nav-link" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
            </div>
        </aside>

        <main class="feed-container" id="main-content">
            <!-- Content injected via JS -->
        </main>

        <aside class="right-panel">
            <div class="user-profile-summary">
                <div class="user-info-summary">
                    <img src="" id="current-user-avatar" class="avatar-lg" alt="User">
                    <div class="username-block">
                        <div id="current-user-name">username</div>
                        <div id="current-user-fullname">Full Name</div>
                    </div>
                </div>
                <div class="switch-btn" onclick="Auth.logout()">Switch</div>
            </div>
            <div class="suggestions-header">
                <span>Suggestions For You</span>
                <span style="color: var(--text-main); font-weight: 400; cursor: pointer;">See All</span>
            </div>
            <div id="suggestions-list"></div>
        </aside>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <div class="mobile-nav hidden" id="mobile-nav">
        <a href="#" onclick="Router.navigate('home')" class="btn-icon"><i class="fas fa-home"></i></a>
        <a href="#" onclick="Router.navigate('explore')" class="btn-icon"><i class="fas fa-search"></i></a>
        <a href="#" onclick="UI.openCreate()" class="btn-icon"><i class="fas fa-plus-square"></i></a>
        <a href="#" onclick="Router.navigate('reels')" class="btn-icon"><i class="fas fa-film"></i></a>
        <a href="#" onclick="Router.navigate('profile')" class="btn-icon"><i class="far fa-user-circle"></i></a>
    </div>

    <!-- CREATE POST MODAL -->
    <div class="modal-overlay" id="create-modal">
        <div class="create-post-modal">
            <div class="modal-header">
                <span onclick="UI.closeModal('create-modal')" style="cursor: pointer;">Cancel</span>
                <span>Create new post</span>
                <span onclick="Posts.submit()" class="btn-ghost" style="cursor: pointer; padding: 0;">Share</span>
            </div>
            <div class="modal-body">
                <input type="file" id="post-file" accept="image/*" class="hidden" onchange="Posts.previewImage(this)">
                <div class="upload-area" id="upload-trigger" onclick="document.getElementById('post-file').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; margin-bottom: 10px;"></i>
                    <p>Drag photos here or click to upload</p>
                </div>
                <img id="post-preview" class="upload-preview">
                <textarea id="post-caption" class="auth-input" placeholder="Write a caption..." rows="3" style="resize: none;"></textarea>
            </div>
        </div>
    </div>

    <!-- STORY VIEWER MODAL -->
    <div id="story-viewer" onclick="Stories.close()">
        <div class="story-nav">
            <i class="fas fa-chevron-left"></i>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img id="story-user-img" src="" class="user-avatar-small">
                <span id="story-username" style="font-weight: 600; font-size: 0.9rem;">username</span>
                <span style="opacity: 0.7; font-size: 0.8rem;">5h</span>
            </div>
            <i class="fas fa-ellipsis-h"></i>
        </div>
        <div class="story-progress-bar">
            <div class="story-progress-fill" id="story-fill"></div>
        </div>
        <div class="story-content" id="story-content-bg"></div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- 
     * =========================================
     * JAVASCRIPT LOGIC (BACKEND UCHUN)
     * =========================================
     -->
    <script>
        // --- MOCKDB O'CHIRILDI, ENDI API BEKENDGA MUROJAAT QILADI ---

        const API_BASE_URL = 'http://127.0.0.1:5000/api';
        let AUTH_TOKEN = localStorage.getItem('nebula_token') || null;

        const API = {
            // Yordamchi funksiya: So'rov yuborish
            async request(endpoint, method = 'GET', body = null) {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (AUTH_TOKEN) {
                    headers['Authorization'] = AUTH_TOKEN;
                }

                const config = {
                    method,
                    headers
                };
                if (body) config.body = JSON.stringify(body);

                try {
                    const response = await fetch(`${API_BASE_URL}${endpoint}`, config);
                    if (response.status === 401) {
                        Auth.logout(); // Token yaroqsiz bo'lsa chiqish
                        return null;
                    }
                    return await response.json();
                } catch (error) {
                    console.error("API Error:", error);
                    UI.toast('Server bilan aloqa yo\'q', 'error');
                    return null;
                }
            },

            async login(email, password) {
                const res = await this.request('/login', 'POST', {
                    email,
                    password
                });
                if (res && res.success) {
                    AUTH_TOKEN = res.token;
                    localStorage.setItem('nebula_token', res.token);
                    return res;
                }
                return res;
            },

            async register(userData) {
                const res = await this.request('/register', 'POST', userData);
                return res;
            },

            async getPosts(userIdFilter = null) {
                // Backendda hamma postlarni olyapmiz, filtrlash frontendda ham bo'lishi mumkin
                const res = await this.request('/posts');
                if (!res) return [];
                let posts = res;
                if (userIdFilter) {
                    posts = posts.filter(p => p.user.id == userIdFilter);
                }
                return posts;
            },

            async createPost(imageBase64, caption) {
                return await this.request('/posts', 'POST', {
                    image: imageBase64,
                    caption
                });
            },

            async toggleLike(postId) {
                const res = await this.request(`/posts/${postId}/like`, 'POST');
                if (res) return res.liked;
                return false;
            },

            async addComment(postId, text) {
                // Kommentariyalar uchun backendda alohida GET endpointi yo'q, shuning uchun
                // biz shunchaki yuboramiz va UI yangilanadi.
                return await this.request(`/posts/${postId}/comments`, 'POST', {
                    text
                });
            },

            async searchPosts(query) {
                return await this.request(`/search?q=${encodeURIComponent(query)}`);
            },

            async getUsers() {
                return await this.request('/users');
            }
        };

        const State = {
            user: JSON.parse(localStorage.getItem('nebula_current_user')) || null,
            theme: localStorage.getItem('nebula_theme') || 'dark'
        };

        const Auth = {
            async login(e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                UI.showLoading();

                const res = await API.login(email, password);
                UI.hideLoading();

                if (res && res.success) {
                    State.user = res.user;
                    localStorage.setItem('nebula_current_user', JSON.stringify(res.user));
                    UI.initApp();
                } else {
                    UI.toast(res ? res.message : 'Xatolik yuz berdi', 'error');
                }
            },
            async register(e) {
                e.preventDefault();
                const userData = {
                    email: document.getElementById('reg-email').value,
                    fullname: document.getElementById('reg-name').value,
                    username: document.getElementById('reg-username').value,
                    password: document.getElementById('reg-password').value
                };
                UI.showLoading();
                const res = await API.register(userData);
                UI.hideLoading();
                if (res && res.success) {
                    UI.toast('Ro\'yxatdan o\'tdingiz! Kirish.', 'success');
                    UI.toggleAuth('login');
                } else {
                    UI.toast(res ? res.message : 'Xatolik', 'error');
                }
            },
            logout() {
                State.user = null;
                AUTH_TOKEN = null;
                localStorage.removeItem('nebula_current_user');
                localStorage.removeItem('nebula_token');
                // Backend tokenni o'chirishni talab qilmaymiz (oddiy demo uchun)
                location.reload();
            }
        };

        const Posts = {
            imageBase64: null,

            async loadFeed(userId = null) {
                const container = document.getElementById('main-content');
                const posts = await API.getPosts(userId);

                let html = '';
                if (!userId) {
                    html += `<div class="stories-rail" id="stories-rail"></div>`;
                }

                if (posts.length === 0) {
                    html += `<div style="padding: 40px; text-align: center; color: var(--text-secondary)">Postlar yo'q.</div>`;
                } else {
                    posts.forEach(post => {
                        const isLiked = post.is_liked; // Backenddan keldi
                        const likeClass = isLiked ? 'liked fas' : 'far';

                        html += `
                            <article class="post-card">
                                <div class="post-header">
                                    <div class="post-user" onclick="Router.navigate('profile', '${post.user.id}')">
                                        <img src="${post.user.avatar}" class="user-avatar-small">
                                        <span>${post.user.username}</span>
                                    </div>
                                    <i class="fas fa-ellipsis-h"></i>
                                </div>
                                <div class="post-image-container" ondblclick="Posts.handleLike('${post.id}', this)">
                                    <img src="${post.image}" class="post-image" loading="lazy">
                                    <i class="fas fa-heart big-heart" id="big-heart-${post.id}"></i>
                                </div>
                                <div class="post-actions">
                                    <div class="action-left">
                                        <i class="${likeClass} fa-heart like-btn" id="like-btn-${post.id}" onclick="Posts.handleLike('${post.id}')"></i>
                                        <i class="far fa-comment" onclick="document.getElementById('comment-input-${post.id}').focus()"></i>
                                        <i class="far fa-paper-plane" onclick="UI.toast('Yuborildi', 'success')"></i>
                                    </div>
                                    <i class="far fa-bookmark" onclick="UI.toast('Saqlandi', 'success')"></i>
                                </div>
                                <div class="post-content">
                                    <div class="likes-count" id="likes-count-${post.id}">${post.likes} likes</div>
                                    <div class="caption">
                                        <span class="username" onclick="Router.navigate('profile', '${post.user.id}')">${post.user.username}</span> ${post.caption}
                                    </div>
                                    <div class="comments-list" id="comments-${post.id}"></div>
                                    <div class="timestamp">${UI.timeSince(post.timestamp)}</div>
                                </div>
                                <div class="add-comment">
                                    <i class="far fa-smile" style="margin-right: 12px; font-size: 1.5rem; padding-top: 2px;"></i>
                                    <textarea id="comment-input-${post.id}" class="comment-input" placeholder="Izoh yozish..." oninput="UI.autoResize(this)"></textarea>
                                    <button class="post-btn" id="post-btn-${post.id}" onclick="Posts.postComment('${post.id}')">Post</button>
                                </div>
                            </article>
                        `;
                    });
                }
                container.innerHTML = html;
                if (!userId) this.loadStories();
            },

            loadStories() {
                // Stories uchun hamma userni olish
                const rail = document.getElementById('stories-rail');
                if (!rail) return;

                API.getUsers().then(users => {
                    if (!users) return;
                    let html = `
                        <div class="story-item" onclick="UI.toast('Sizning hikoyangiz')">
                            <div class="story-ring" style="border: 2px solid #ddd; background: none;">
                                <img src="${State.user.avatar}" class="story-img">
                            </div>
                            <span class="story-name">Siz</span>
                        </div>
                    `;
                    users.forEach(u => {
                        html += `
                            <div class="story-item" onclick="Stories.open('${u.id}', '${u.username}', '${u.avatar}')">
                                <div class="story-ring">
                                    <img src="${u.avatar}" class="story-img">
                                </div>
                                <span class="story-name">${u.username}</span>
                            </div>
                        `;
                    });
                    rail.innerHTML = html;
                });
            },

            previewImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imageBase64 = e.target.result;
                        const preview = document.getElementById('post-preview');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                        document.getElementById('upload-trigger').style.display = 'none';
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            async submit() {
                const caption = document.getElementById('post-caption').value;
                if (!this.imageBase64) return UI.toast('Rasm tanlang', 'error');
                UI.showLoading();
                await API.createPost(this.imageBase64, caption);
                UI.hideLoading();
                UI.closeModal('create-modal');
                UI.toast('Post muvaffaqiyatli joylandi', 'success');
                // Tozalash
                this.imageBase64 = null;
                document.getElementById('post-file').value = '';
                document.getElementById('post-caption').value = '';
                document.getElementById('post-preview').style.display = 'none';
                document.getElementById('upload-trigger').style.display = 'block';

                Router.navigate(Router.currentPage, Router.currentUserId);
            },

            async handleLike(postId, container) {
                // Optimistik UI yangilash (tezlik uchun)
                const btn = document.getElementById(`like-btn-${postId}`);
                const countLabel = document.getElementById(`likes-count-${postId}`);
                let currentCount = parseInt(countLabel.innerText);
                const isLikedUI = btn.classList.contains('liked');

                if (container) {
                    const bigHeart = document.getElementById(`big-heart-${postId}`);
                    bigHeart.classList.remove('animate-heart');
                    void bigHeart.offsetWidth;
                    bigHeart.classList.add('animate-heart');
                }

                // API ga so'rov yuborish
                const serverLiked = await API.toggleLike(postId);

                // Server javobiga qarab UI ni to'g'irlash
                if (serverLiked !== null) {
                    if (serverLiked) {
                        btn.classList.remove('far');
                        btn.classList.add('liked', 'fas');
                        if (!isLikedUI) currentCount++;
                    } else {
                        btn.classList.remove('liked', 'fas');
                        btn.classList.add('far');
                        if (isLikedUI) currentCount--;
                    }
                    // Serverdan aniq sonni olish yaxshi, lekin demo uchun hisoblab chiqamiz
                    countLabel.innerText = `${currentCount} likes`;
                }
            },

            async postComment(postId) {
                const input = document.getElementById(`comment-input-${postId}`);
                const text = input.value.trim();
                if (!text) return;

                await API.addComment(postId, text);

                input.value = '';
                input.style.height = '20px';
                document.getElementById(`post-btn-${postId}`).classList.remove('active');

                // UIga qo'shish (Chunki backenddan kommentariyalar ro'yxatini qaytarish murakkablashadi, shunchaki qo'shib qo'yamiz)
                const list = document.getElementById(`comments-${postId}`);
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<strong>${State.user.username}</strong> ${text}`;
                list.appendChild(div);
            }
        };

        const Stories = {
            timer: null,
            // User obyektini olish o'rniga parametr qabul qilamiz
            open(userId, username, avatar) {
                const modal = document.getElementById('story-viewer');
                const fill = document.getElementById('story-fill');
                const content = document.getElementById('story-content-bg');

                document.getElementById('story-username').innerText = username;
                document.getElementById('story-user-img').src = avatar;

                // Tasodifiy rasm
                const storyImg = `https://picsum.photos/seed/${userId}story/800/1200`;
                content.style.backgroundImage = `url(${storyImg})`;

                modal.classList.add('open');

                fill.style.transition = 'none';
                fill.style.width = '0%';
                setTimeout(() => {
                    fill.style.transition = 'width 5s linear';
                    fill.style.width = '100%';
                }, 50);

                this.timer = setTimeout(() => {
                    this.close();
                }, 5050);
            },
            close() {
                document.getElementById('story-viewer').classList.remove('open');
                if (this.timer) clearTimeout(this.timer);
            }
        };

        const UI = {
            initApp() {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-layout').classList.remove('hidden');
                document.getElementById('mobile-nav').classList.remove('hidden');
                document.getElementById('current-user-avatar').src = State.user.avatar;
                document.getElementById('current-user-name').innerText = State.user.username;
                document.getElementById('current-user-fullname').innerText = State.user.fullname;

                API.getUsers().then(users => {
                    if (!users) return;
                    const list = document.getElementById('suggestions-list');
                    list.innerHTML = users.slice(0, 5).map(u => `
                        <div class="suggestion-item">
                            <div class="user-info-summary" style="cursor:pointer" onclick="Router.navigate('profile', '${u.id}')">
                                <img src="${u.avatar}" class="user-avatar-small">
                                <div class="username-block">
                                    <div style="font-size: 0.9rem; font-weight: 600;">${u.username}</div>
                                </div>
                            </div>
                            <div class="follow-btn" onclick="UI.toast('Obuna bo\'ldi', 'success')">Follow</div>
                        </div>
                    `).join('');
                });
                this.applyTheme();
                Router.navigate('home');
            },
            toggleAuth(screen) {
                document.getElementById('login-form').classList.toggle('hidden', screen !== 'login');
                document.getElementById('register-form').classList.toggle('hidden', screen !== 'register');
            },
            toggleTheme() {
                State.theme = State.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('nebula_theme', State.theme);
                this.applyTheme();
            },
            applyTheme() {
                document.documentElement.setAttribute('data-theme', State.theme);
            },
            toast(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const div = document.createElement('div');
                div.className = 'toast';
                div.style.borderColor = type === 'error' ? 'var(--danger)' : 'var(--border-color)';
                div.innerText = msg;
                container.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },
            showLoading() {
                document.body.style.cursor = 'wait';
            },
            hideLoading() {
                document.body.style.cursor = 'default';
            },
            openModal(id) {
                document.getElementById(id).classList.add('open');
            },
            closeModal(id) {
                document.getElementById(id).classList.remove('open');
            },
            openCreate() {
                this.openModal('create-modal');
            },
            autoResize(textarea) {
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
                const btn = textarea.nextElementSibling;
                btn.classList.toggle('active', textarea.value.trim().length > 0);
            },
            timeSince(date) {
                // date backenddan millisekundlarda keladi
                const seconds = Math.floor((new Date() - date) / 1000);
                let interval = seconds / 31536000;
                if (interval > 1) return Math.floor(interval) + " YIL OLDIN";
                interval = seconds / 2592000;
                if (interval > 1) return Math.floor(interval) + " OY OLDIN";
                interval = seconds / 86400;
                if (interval > 1) return Math.floor(interval) + " KUN OLDIN";
                interval = seconds / 3600;
                if (interval > 1) return Math.floor(interval) + " SOAT OLDIN";
                interval = seconds / 60;
                if (interval > 1) return Math.floor(interval) + " DAQIQA OLDIN";
                return "HOZIRGINA";
            }
        };

        const Router = {
            currentPage: 'home',
            currentUserId: null,

            navigate(page, userId = null) {
                this.currentPage = page;
                this.currentUserId = userId;
                const main = document.getElementById('main-content');

                if (page === 'home') {
                    Posts.loadFeed();
                } else if (page === 'explore') {
                    main.innerHTML = `
                        <div class="search-container">
                            <input type="text" id="search-input" class="search-input" placeholder="Qidirish (masalan: 'nature', 'tech')..." onkeyup="Router.handleSearch(this.value)">
                            <div class="search-results" id="search-results">
                                <img src="https://picsum.photos/seed/e1/300/300" onclick="UI.toast('Post')">
                                <img src="https://picsum.photos/seed/e2/300/300" onclick="UI.toast('Post')">
                                <img src="https://picsum.photos/seed/e3/300/300" onclick="UI.toast('Post')">
                            </div>
                        </div>
                    `;
                } else if (page === 'profile') {
                    // Profile sahifasi uchun backenddan user ma'lumotlarini olishimiz kerak
                    // Hozircha State.user dan yoki API.getUser dan foydalanamiz
                    // Bu yerda soddalik uchun, agar user ID berilgan bo'lsa API chaqirish kerak bo'ladi,
                    // lekin bizda hamma userni listni olish endpointi bor.

                    // To'liq profile logikasini qo'shish uchun backendda `/api/users/<id>` endpointi kerak.
                    // Hozircha mavjud userlar orasidan qidiramiz:

                    let targetUser = State.user;
                    if (userId && userId != State.user.id) {
                        // Boshqa user profileni ko'rish uchun backendda qo'shimcha API kerak
                        // Hozircha shuni ko'rsatamiz:
                        UI.toast('Boshqa foydalanuvchi profili hali tayyor emas', 'error');
                        return;
                    }

                    API.getPosts(targetUser.id).then(posts => {
                        const gridHtml = posts.length ? posts.map(p => `
                            <div style="position:relative; cursor:pointer" onclick="UI.toast('Postni ochish')">
                                <img src="${p.image}">
                                <div style="position:absolute; top:10px; right:10px; color:white; font-size:1.2rem; text-shadow: 0 1px 3px rgba(0,0,0,0.8)">
                                    <i class="fas fa-heart"></i> ${p.likes}
                                </div>
                            </div>
                        `).join('') : '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-secondary)">Postlar yo\'q.</div>';

                        main.innerHTML = `
                            <div class="profile-header">
                                <img src="${targetUser.avatar}" class="profile-avatar">
                                <div style="flex:1">
                                    <div style="display:flex; align-items:center; gap:10px; margin-bottom: 20px;">
                                        <h2 style="font-size: 1.5rem;">${targetUser.username}</h2>
                                        <button class="btn" style="border:1px solid var(--border-color)" onclick="UI.toast('Tahrirlash')">Tahrirlash</button>
                                    </div>
                                    <div class="profile-stats">
                                        <div><span class="stat-num">${posts.length}</span><span class="stat-label">post</span></div>
                                        <div><span class="stat-num">142</span><span class="stat-label">followers</span></div>
                                        <div><span class="stat-num">45</span><span class="stat-label">following</span></div>
                                    </div>
                                    <div style="font-weight:600;">${targetUser.fullname}</div>
                                    <div style="color:var(--text-secondary)">Creator • Digital Artist</div>
                                </div>
                            </div>
                            <div class="flex" style="border-bottom: 1px solid var(--border-color); justify-content: center;">
                                <div style="padding: 15px; border-top: 1px solid var(--text-main); font-weight: 600; cursor: pointer;"><i class="fas fa-th"></i> POSTLAR</div>
                            </div>
                            <div class="profile-grid">
                                ${gridHtml}
                            </div>
                        `;
                    });
                } else if (page === 'reels') {
                    main.innerHTML = `<div style="height: 80vh; display: flex; align-items: center; justify-content: center; background: #000;">
                        <div style="text-align: center; color: white;">
                            <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 20px;"></i>
                            <h2>Reels</h2>
                        </div>
                     </div>`;
                }
            },

            async handleSearch(query) {
                const resultsContainer = document.getElementById('search-results');
                if (query.length < 2) {
                    resultsContainer.innerHTML = `
                        <img src="https://picsum.photos/seed/e1/300/300">
                        <img src="https://picsum.photos/seed/e2/300/300">
                        <img src="https://picsum.photos/seed/e3/300/300">
                    `;
                    return;
                }
                const posts = await API.searchPosts(query);
                if (!posts) return;

                if (posts.length === 0) {
                    resultsContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 20px;">Hech narsa topilmadi</div>`;
                    return;
                }
                resultsContainer.innerHTML = posts.map(p => `
                    <div style="position:relative; cursor:pointer" onclick="UI.toast('Post: ${p.caption.substring(0,10)}...')">
                        <img src="${p.image}">
                        <div style="position:absolute; bottom:5px; left:5px; color:white; font-size:0.8rem; text-shadow: 0 1px 3px rgba(0,0,0,0.8)">
                            <i class="fas fa-heart"></i> ${p.likes}
                        </div>
                    </div>
                `).join('');
            }
        };

        // MockDB.init() o'chirildi, endi server ishlaydi
        window.addEventListener('DOMContentLoaded', () => {
            if (State.user && AUTH_TOKEN) {
                UI.initApp();
            }
        });
    </script>
</body>

</html>
