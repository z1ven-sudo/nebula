<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nebula</title>

<style>

body{
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.box{
    width:300px;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#result{
    margin-top:15px;
}

</style>
</head>
<body>

<div class="box">

    <h1>Nebula</h1>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">
        Register
    </button>

    <button onclick="login()">
        Login
    </button>

    <p id="result"></p>

</div>

<script>

const API = ""

async function register(){

    const username =
        document.getElementById("username").value

    const password =
        document.getElementById("password").value

    const res = await fetch(API + "/register", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username,
            password
        })
    })

    const data = await res.json()

    document.getElementById("result")
        .innerText = data.message || data.error
}

async function login(){

    const username =
        document.getElementById("username").value

    const password =
        document.getElementById("password").value

    const res = await fetch(API + "/login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username,
            password
        })
    })

    const data = await res.json()

    document.getElementById("result")
        .innerText = data.message || data.error
}

</script>

</body>
</html>
